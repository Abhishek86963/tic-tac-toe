<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe Smart Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #080c14;
            --surface: #0e1420;
            --panel: #131a28;
            --border: #1e2d45;
            --x: #ff4d6d;
            --x-glow: #ff4d6d55;
            --o: #00e5c3;
            --o-glow: #00e5c355;
            --accent: #4f8fff;
            --accent2: #7c3aed;
            --win: #ffd60a;
            --win-glow: #ffd60a44;
            --text: #e2e8f0;
            --muted: #64748b;
            --cell-hover: #1a2540;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px 48px;
            overflow-x: hidden;
            transition: background .4s, color .4s
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(79, 143, 255, .04) 1px, transparent 1px), linear-gradient(90deg, rgba(79, 143, 255, .04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px
        }

        .header {
            text-align: center;
            padding: 10px 0 4px
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(135deg, var(--accent), var(--o));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .subtitle {
            font-size: .6rem;
            letter-spacing: 5px;
            color: var(--muted);
            margin-top: 5px;
            text-transform: uppercase
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 5px;
            width: 100%
        }

        .mode-btn {
            flex: 1;
            padding: 10px 6px;
            border: none;
            border-radius: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: .76rem;
            cursor: pointer;
            transition: all .25s;
            background: transparent;
            color: var(--muted)
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: #fff;
            box-shadow: 0 0 20px rgba(79, 143, 255, .3)
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            width: 100%
        }

        .score-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            position: relative;
            overflow: hidden
        }

        .score-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px
        }

        .x-card::before {
            background: var(--x);
            box-shadow: 0 0 8px var(--x)
        }

        .draw-card::before {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent)
        }

        .o-card::before {
            background: var(--o);
            box-shadow: 0 0 8px var(--o)
        }

        .score-label {
            font-size: .58rem;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase
        }

        .score-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            font-weight: 900
        }

        .x-card .score-val {
            color: var(--x);
            text-shadow: 0 0 14px var(--x-glow)
        }

        .draw-card .score-val {
            color: var(--accent);
            text-shadow: 0 0 14px rgba(79, 143, 255, .4)
        }

        .o-card .score-val {
            color: var(--o);
            text-shadow: 0 0 14px var(--o-glow)
        }

        .score-card.bump {
            animation: bump .35s ease
        }

        @keyframes bump {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.13)
            }

            100% {
                transform: scale(1)
            }
        }

        .status-bar {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 16px;
            text-align: center;
            font-size: .86rem;
            letter-spacing: 2px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color .3s
        }

        .board-wrap {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 0 40px rgba(79, 143, 255, .06)
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px
        }

        .cell {
            aspect-ratio: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: background .2s, border-color .2s, box-shadow .2s;
            user-select: none
        }

        .cell:hover:not(.taken) {
            background: var(--cell-hover);
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(79, 143, 255, .18)
        }

        .cell.taken {
            cursor: default
        }

        .sym {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 9vw, 3.2rem);
            font-weight: 900;
            transform: scale(0);
            animation: popIn .32s cubic-bezier(.34, 1.56, .64, 1) forwards
        }

        .sym.x {
            color: var(--x);
            text-shadow: 0 0 20px var(--x-glow)
        }

        .sym.o {
            color: var(--o);
            text-shadow: 0 0 20px var(--o-glow)
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(-20deg);
                opacity: 0
            }

            70% {
                transform: scale(1.15) rotate(4deg);
                opacity: 1
            }

            100% {
                transform: scale(1) rotate(0);
                opacity: 1
            }
        }

        .cell::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .25);
            transform: scale(0);
            opacity: 0;
            pointer-events: none
        }

        .cell.ripple::after {
            animation: ripple .45s ease-out
        }

        @keyframes ripple {
            0% {
                transform: scale(0);
                opacity: .6
            }

            100% {
                transform: scale(18);
                opacity: 0
            }
        }

        .cell.winner {
            background: linear-gradient(135deg, rgba(255, 214, 10, .18), rgba(255, 214, 10, .05));
            border-color: var(--win);
            animation: winPulse .9s ease infinite alternate
        }

        @keyframes winPulse {
            from {
                box-shadow: 0 0 12px var(--win-glow), inset 0 0 8px var(--win-glow)
            }

            to {
                box-shadow: 0 0 32px var(--win-glow), inset 0 0 22px var(--win-glow)
            }
        }

        .controls {
            display: flex;
            gap: 8px;
            width: 100%
        }

        .ctrl-btn {
            flex: 1;
            padding: 11px 6px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--panel);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: .72rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all .2s;
            text-transform: uppercase
        }

        .ctrl-btn.restart:hover {
            border-color: #22c55e;
            color: #22c55e;
            box-shadow: 0 0 12px #22c55e33
        }

        .ctrl-btn.reset:hover {
            border-color: #f97316;
            color: #f97316;
            box-shadow: 0 0 12px #f9731633
        }

        .ctrl-btn.theme:hover {
            border-color: #a78bfa;
            color: #a78bfa;
            box-shadow: 0 0 12px #a78bfa33
        }

        .stats-panel {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px
        }

        .stats-title {
            font-size: .62rem;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 10px;
            text-transform: uppercase
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            font-size: .74rem
        }

        .stat-row:last-child {
            border-bottom: none
        }

        .stat-key {
            color: var(--muted)
        }

        .stat-value {
            color: var(--text);
            font-weight: bold
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(8, 12, 20, .88);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center
        }

        .overlay.show {
            display: flex
        }

        .popup {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 38px 32px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 0 60px rgba(79, 143, 255, .25);
            animation: slideUp .38s cubic-bezier(.34, 1.56, .64, 1)
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px) scale(.88);
                opacity: 0
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1
            }
        }

        .popup-icon {
            font-size: 3rem;
            margin-bottom: 10px
        }

        .popup-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 8px
        }

        .popup-sub {
            color: var(--muted);
            font-size: .76rem;
            margin-bottom: 22px;
            line-height: 1.7
        }

        .popup-btn {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px 34px;
            font-family: 'Orbitron', sans-serif;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 22px rgba(79, 143, 255, .35);
            transition: opacity .2s, transform .2s
        }

        .popup-btn:hover {
            opacity: .85;
            transform: scale(1.04)
        }

        body.light {
            --bg: #f0f4ff;
            --surface: #fff;
            --panel: #fff;
            --border: #c5cae9;
            --x: #e63946;
            --x-glow: #e6394633;
            --o: #0891b2;
            --o-glow: #0891b233;
            --accent: #4361ee;
            --accent2: #7c3aed;
            --win: #f59e0b;
            --win-glow: #f59e0b33;
            --text: #1a1a2e;
            --muted: #64748b;
            --cell-hover: #eef2ff
        }

        body.light::before {
            background-image: linear-gradient(rgba(67, 97, 238, .07) 1px, transparent 1px), linear-gradient(90deg, rgba(67, 97, 238, .07) 1px, transparent 1px)
        }

        .dots span {
            display: inline-block;
            animation: blink 1.1s infinite
        }

        .dots span:nth-child(2) {
            animation-delay: .22s
        }

        .dots span:nth-child(3) {
            animation-delay: .44s
        }

        @keyframes blink {

            0%,
            80%,
            100% {
                opacity: .1
            }

            40% {
                opacity: 1
            }
        }

        @media(max-width:380px) {
            .controls {
                flex-wrap: wrap
            }

            .ctrl-btn {
                flex: 1 1 45%
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="title">TIC TAC TOE</div>
            <div class="subtitle">Smart Game &nbsp;·&nbsp; Python Project &nbsp;·&nbsp; Web Edition</div>
        </div>
        <div class="mode-selector">
            <button class="mode-btn active" id="btn-pvp" onclick="setMode('pvp')">👥 Player vs Player</button>
            <button class="mode-btn" id="btn-pvc" onclick="setMode('pvc')">🤖 Player vs Computer</button>
        </div>
        <div class="scoreboard">
            <div class="score-card x-card">
                <div class="score-label">✕ &nbsp; X WINS</div>
                <div class="score-val" id="score-x">0</div>
            </div>
            <div class="score-card draw-card">
                <div class="score-label">◈ &nbsp; DRAWS</div>
                <div class="score-val" id="score-d">0</div>
            </div>
            <div class="score-card o-card">
                <div class="score-label">○ &nbsp; O WINS</div>
                <div class="score-val" id="score-o">0</div>
            </div>
        </div>
        <div class="status-bar" id="status">Starting...</div>
        <div class="board-wrap">
            <div class="board" id="board"></div>
        </div>
        <div class="controls">
            <button class="ctrl-btn restart" onclick="startGame()">↺ Restart</button>
            <button class="ctrl-btn reset" onclick="resetScore()">⊘ Reset Score</button>
            <button class="ctrl-btn theme" id="theme-btn" onclick="toggleTheme()">☀ Light Mode</button>
        </div>
        <div class="stats-panel">
            <div class="stats-title">📊 &nbsp; Game Statistics</div>
            <div class="stat-row"><span class="stat-key">Total Games Played</span><span class="stat-value"
                    id="s-total">0</span></div>
            <div class="stat-row"><span class="stat-key">Fastest Win (moves)</span><span class="stat-value"
                    id="s-fastest">—</span></div>
            <div class="stat-row"><span class="stat-key">Moves This Game</span><span class="stat-value"
                    id="s-moves">0</span></div>
            <div class="stat-row"><span class="stat-key">X Win Rate</span><span class="stat-value" id="s-rate">—</span>
            </div>
        </div>
    </div>
    <div class="overlay" id="overlay">
        <div class="popup">
            <div class="popup-icon" id="p-icon">🏆</div>
            <div class="popup-title" id="p-title">PLAYER X WINS</div>
            <div class="popup-sub" id="p-sub"></div>
            <button class="popup-btn" onclick="closePopup()">▶ PLAY AGAIN</button>
        </div>
    </div>
    <script>
        let board = Array(9).fill(''), currentPlayer = 'X', gameActive = false, gameMode = 'pvp';
        let scoreX = 0, scoreO = 0, scoreDraw = 0, totalGames = 0, fastestWin = null, movesThisGame = 0, isLight = false;
        const WIN_COMBOS = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]];

        function buildBoard() {
            const el = document.getElementById('board');
            el.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const c = document.createElement('div');
                c.className = 'cell'; c.dataset.idx = i;
                c.addEventListener('click', () => onCellClick(i));
                el.appendChild(c);
            }
        }
        function getCell(i) { return document.querySelector('.cell[data-idx="' + i + '"]') }

        function startGame() {
            board = Array(9).fill(''); currentPlayer = 'X'; gameActive = true; movesThisGame = 0;
            for (let i = 0; i < 9; i++) { const c = getCell(i); c.className = 'cell'; c.innerHTML = ''; }
            updateStatus(); updateStats();
        }
        function setMode(m) {
            gameMode = m;
            document.getElementById('btn-pvp').classList.toggle('active', m === 'pvp');
            document.getElementById('btn-pvc').classList.toggle('active', m === 'pvc');
            resetScore();
        }
        function onCellClick(idx) {
            if (!gameActive || board[idx] !== '') return;
            if (gameMode === 'pvc' && currentPlayer === 'O') return;
            makeMove(idx, currentPlayer);
        }
        function makeMove(idx, player) {
            board[idx] = player; movesThisGame++;
            const cell = getCell(idx);
            cell.classList.add('taken');
            cell.innerHTML = '<span class="sym ' + player.toLowerCase() + '">' + (player === 'X' ? '✕' : '○') + '</span>';
            cell.classList.add('ripple');
            setTimeout(() => cell.classList.remove('ripple'), 450);
            playSound(player === 'X' ? 'x' : 'o');
            const combo = getWinCombo();
            if (combo) { handleWin(player, combo); return; }
            if (board.every(v => v !== '')) { handleDraw(); return; }
            currentPlayer = player === 'X' ? 'O' : 'X';
            updateStatus(); updateStats();
            if (gameMode === 'pvc' && currentPlayer === 'O' && gameActive) {
                gameActive = false;
                setTimeout(() => { gameActive = true; makeMove(bestMove([...board]), 'O'); }, 450);
            }
        }
        function getWinCombo() {
            for (const [a, b, c] of WIN_COMBOS) { if (board[a] && board[a] === board[b] && board[b] === board[c]) return [a, b, c]; }
            return null;
        }
        function handleWin(player, combo) {
            gameActive = false;
            if (!fastestWin || movesThisGame < fastestWin) fastestWin = movesThisGame;
            combo.forEach(i => getCell(i).classList.add('winner'));
            if (player === 'X') { scoreX++; bump('.x-card'); } else { scoreO++; bump('.o-card'); }
            totalGames++; updateScores(); updateStats(); playSound('win');
            const isAI = gameMode === 'pvc';
            const icon = player === 'X' ? '🏆' : (isAI ? '🤖' : '🏆');
            const title = isAI ? (player === 'X' ? 'YOU WIN!' : 'AI WINS!') : 'PLAYER ' + player + ' WINS!';
            const msg = isAI ? (player === 'X' ? '🏆 You Win!' : '🤖 Computer Wins!') : '🏆 Player ' + player + ' Wins!';
            setStatus(msg, player === 'X' ? 'var(--x)' : 'var(--o)');
            setTimeout(() => showPopup(icon, title, 'Moves: ' + movesThisGame + ' | Total: ' + totalGames), 900);
        }
        function handleDraw() {
            gameActive = false; scoreDraw++; totalGames++;
            bump('.draw-card'); updateScores(); updateStats(); playSound('draw');
            setStatus("🤝 It's a Draw!", 'var(--accent)');
            setTimeout(() => showPopup('🤝', "IT'S A DRAW!", 'Moves: ' + movesThisGame + ' | Total: ' + totalGames), 700);
        }
        function resetScore() {
            scoreX = scoreO = scoreDraw = totalGames = 0; fastestWin = null;
            updateScores(); updateStats(); startGame();
        }
        function checkWin(b, p) { return WIN_COMBOS.some(([a, x, c]) => b[a] === p && b[x] === p && b[c] === p); }
        function minimax(b, isMax, depth) {
            depth = depth || 0;
            if (checkWin(b, 'O')) return 10 - depth;
            if (checkWin(b, 'X')) return depth - 10;
            const empty = b.reduce((a, v, i) => v === '' ? [...a, i] : a, []);
            if (!empty.length) return 0;
            if (isMax) { let best = -Infinity; for (const i of empty) { b[i] = 'O'; best = Math.max(best, minimax(b, false, depth + 1)); b[i] = ''; } return best; }
            else { let best = Infinity; for (const i of empty) { b[i] = 'X'; best = Math.min(best, minimax(b, true, depth + 1)); b[i] = ''; } return best; }
        }
        function bestMove(b) {
            const empty = b.reduce((a, v, i) => v === '' ? [...a, i] : a, []);
            for (const i of empty) { b[i] = 'O'; if (checkWin(b, 'O')) { b[i] = ''; return i; } b[i] = ''; }
            for (const i of empty) { b[i] = 'X'; if (checkWin(b, 'X')) { b[i] = ''; return i; } b[i] = ''; }
            let best = -Infinity, pos = empty[0];
            for (const i of empty) { b[i] = 'O'; const s = minimax(b, false, 0); b[i] = ''; if (s > best) { best = s; pos = i; } }
            return pos;
        }
        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                if (type === 'x') { osc.frequency.setValueAtTime(600, ctx.currentTime); gain.gain.setValueAtTime(.12, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .1); osc.start(); osc.stop(ctx.currentTime + .1); }
                else if (type === 'o') { osc.frequency.setValueAtTime(380, ctx.currentTime); gain.gain.setValueAtTime(.12, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .1); osc.start(); osc.stop(ctx.currentTime + .1); }
                else if (type === 'win') { [523, 659, 784, 1047].forEach((f, i) => { const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.setValueAtTime(f, ctx.currentTime + i * .13); g.gain.setValueAtTime(.18, ctx.currentTime + i * .13); g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + i * .13 + .2); o.start(ctx.currentTime + i * .13); o.stop(ctx.currentTime + i * .13 + .2); }); }
                else if (type === 'draw') { osc.frequency.setValueAtTime(350, ctx.currentTime); osc.frequency.linearRampToValueAtTime(200, ctx.currentTime + .35); gain.gain.setValueAtTime(.12, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .35); osc.start(); osc.stop(ctx.currentTime + .35); }
            } catch (e) { }
        }
        function updateStatus() {
            if (!gameActive) return;
            const p = currentPlayer; let msg, color;
            if (gameMode === 'pvc') {
                if (p === 'X') { msg = '🎯 Your Turn (X)'; color = 'var(--x)'; }
                else { msg = '🤖 AI Thinking<span class="dots"><span>.</span><span>.</span><span>.</span></span>'; color = 'var(--o)'; }
            } else { msg = '🎯 Player ' + p + "'s Turn"; color = p === 'X' ? 'var(--x)' : 'var(--o)'; }
            setStatus(msg, color);
        }
        function setStatus(html, color) { const el = document.getElementById('status'); el.innerHTML = html; el.style.color = color; }
        function updateScores() { document.getElementById('score-x').textContent = scoreX; document.getElementById('score-o').textContent = scoreO; document.getElementById('score-d').textContent = scoreDraw; }
        function bump(sel) { const el = document.querySelector(sel); el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
        function updateStats() {
            document.getElementById('s-total').textContent = totalGames;
            document.getElementById('s-fastest').textContent = fastestWin || '—';
            document.getElementById('s-moves').textContent = movesThisGame;
            document.getElementById('s-rate').textContent = totalGames > 0 ? Math.round(scoreX / totalGames * 100) + '%' : '—';
        }
        function showPopup(icon, title, sub) { document.getElementById('p-icon').textContent = icon; document.getElementById('p-title').textContent = title; document.getElementById('p-sub').textContent = sub; document.getElementById('overlay').classList.add('show'); }
        function closePopup() { document.getElementById('overlay').classList.remove('show'); startGame(); }
        function toggleTheme() { isLight = !isLight; document.body.classList.toggle('light', isLight); document.getElementById('theme-btn').textContent = isLight ? '☾ Dark Mode' : '☀ Light Mode'; }

        buildBoard();
        startGame();
    </script>
</body>

</html>
